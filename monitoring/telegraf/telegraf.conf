# Static telegraf plumbing. All inputs are COMPILED from intent - they
# arrive as per-device fragments in /etc/telegraf/telegraf.d (fetched by
# scripts/fetch_artifacts.py). This file only owns the agent + output.
#
# NOTE on gNMI field names: openconfig/native paths yield per-OS field
# names. The starlark processor below normalizes the common BGP ones to
# the metric names the compiled Prometheus rules expect
# (bgp_session_state_established, bgp_session_prefixes_received/sent).
# It covers the openconfig spelling both cEOS PEs emit today, plus the
# session-state / received / sent variants other platforms use. Extend the
# mapping when you add platforms - that is renderer knowledge, never intent.

[agent]
  interval = "30s"
  flush_interval = "10s"
  omit_hostname = true

[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
  export_timestamp = true

[[processors.starlark]]
  namepass = ["bgp_session_state", "bgp_route_count", "policy_export_violation"]
  source = '''
def apply(metric):
    # normalize gNMI-sourced BGP metrics to the intent-facing names
    out = Metric("bgp_session")
    for k, v in metric.tags.items():
        tag = k
        if k in ("neighbor_address", "peer-address", "neighbor"):
            tag = "neighbor"
        out.tags[tag] = v
    for k, v in metric.fields.items():
        key = k.lower()
        if "session_state" in key or "session-state" in key:
            out.fields["state_established"] = 1 if str(v).upper() == "ESTABLISHED" else 0
        elif "received" in key:
            out.fields["prefixes_received"] = v
        elif "sent" in key:
            out.fields["prefixes_sent"] = v
        else:
            out.fields[k] = v
    out.time = metric.time
    return out
'''
