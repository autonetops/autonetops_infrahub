# Static scrape plumbing. Alerting logic lives in /etc/prometheus/rules,
# which is populated with COMPILED prometheus-rules artifacts (one file
# per routing contract) by scripts/fetch_artifacts.py.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: telegraf
    static_configs:
      - targets: ["telegraf:9273"]
