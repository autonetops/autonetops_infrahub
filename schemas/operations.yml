# ---------------------------------------------------------------------------
# Operations model - WHEN intent may reach the network.
#
# A change window is an OPERATIONAL POLICY (ADR-0017 D8 / ledger item 7):
# OpsChangeWindow inherits IntentPolicy (subject: operational), so
# "what rules are in force" is one query across network and operational
# policies alike. name/description/subject/scope/enabled come from the
# generic; the window shape below is what this kind adds.
#
# Two shapes share one kind:
#   recurring  - days + start_utc + duration_minutes (weekly maintenance)
#   absolute   - starts_at + ends_at (one-off windows and freezes)
# A window with absolute bounds ignores the recurring fields.
#
# window_type:
#   maintenance - deployment allowed inside; max_blast_radius caps how big
#                 a plan may ride this window
#   freeze      - deployment of matching devices is BLOCKED inside, whatever
#                 other windows say; only an emergency dispatch overrides it
#
# An empty device scope means "applies to every device".
#
# Load AFTER (or together with) schemas/intent.yml - the IntentPolicy
# generic must exist first:
#   infrahubctl schema load schemas/intent.yml schemas/operations.yml
# ---------------------------------------------------------------------------
version: "1.0"

nodes:
  - name: ChangeWindow
    namespace: Ops
    description: "When plans may (or must not) be dispatched. An operational policy."
    label: "Change Window"
    icon: "mdi:calendar-clock"
    include_in_menu: false  # listed by menus/menu-intent.yml (under Policies)
    inherit_from:
      - IntentPolicy
    attributes:
      - name: window_type
        kind: Dropdown
        default_value: "maintenance"
        order_weight: 2000
        choices:
          - name: maintenance
            color: "#22c55e"
            description: "Deployment allowed inside this window"
          - name: freeze
            color: "#e11d48"
            description: "Deployment blocked inside this window"
      - name: days
        kind: List
        optional: true
        description: "Recurring weekdays (monday..sunday); ignored when absolute bounds are set"
        order_weight: 2100
      - name: start_utc
        kind: Text
        optional: true
        regex: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        description: "Recurring daily start, HH:MM UTC"
        order_weight: 2200
      - name: duration_minutes
        kind: Number
        optional: true
        description: "Recurring window length in minutes"
        order_weight: 2300
      - name: starts_at
        kind: DateTime
        optional: true
        description: "Absolute one-off start (freezes, ad-hoc windows)"
        order_weight: 2400
      - name: ends_at
        kind: DateTime
        optional: true
        description: "Absolute one-off end"
        order_weight: 2500
      - name: max_blast_radius
        kind: Dropdown
        default_value: "moderate"
        order_weight: 2600
        description: "Largest blast-radius class a plan may have to ride this window"
        choices:
          - name: low
            color: "#22c55e"
          - name: moderate
            color: "#eab308"
          - name: high
            color: "#e11d48"
    relationships:
      - name: devices
        peer: DcimGenericDevice
        identifier: changewindow__devices
        optional: true
        cardinality: many
        kind: Attribute
        description: "Scope; empty means every device"
