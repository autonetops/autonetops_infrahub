# ---------------------------------------------------------------------------
# Intent model - the shared IBN vocabulary (ADR-0015/0017 in autonetops_ibn).
#
#   An intent is ACHIEVED by its contracts, GOVERNED by policies,
#   GUARANTEED by invariants, and TEMPERED by waivers.
#
#   IntentDefinition        the aggregate root: WHY + owner + priority +
#                           domain. Compiles to NOTHING - instruments work.
#     ├─ contracts          IntentContract (generic) - OWNED, cascade; typed
#     │                     promises the compilers read (configs,
#     │                     expectations, collectors, alerts). Typed kinds
#     │                     encode terms natively; free-form contracts carry
#     │                     IntentObjective nodes.
#     ├─ policies           IntentPolicy (generic) - REFERENCED rule
#     │                     instruments (network | operational), attach by
#     │                     scope. OpsChangeWindow inherits this.
#     └─ invariants         IntentInvariant (generic) - conditions that must
#                           always hold; severity warning|major|critical;
#                           typed per condition (no-leak, redundancy, ...).
#   IntentWaiver            time-boxed permission for one subject to violate
#                           one policy or invariant. Hard expiry.
#
# Supporting kinds: IntentTenant (WHO), IntentZone (WHERE), IntentCapability
# (WITH WHAT a platform participates). Contracts reference DCIM/IPAM objects
# so the compilers can anchor rendered artifacts to real devices/prefixes.
#
# This file mirrors autonetops_ibn/infrahub/schemas/intent_model.yml (the
# canonical model) plus this lab's domain-typed contract/invariant kinds.
# `domain` is an attribute, never a node kind; `priority` lives ONLY on the
# intent and flows down. Divergence from the platform model is a review
# finding against ADR-0017.
# ---------------------------------------------------------------------------
version: "1.0"

generics:
  - name: Contract
    namespace: Intent
    label: "Contract"
    description: >-
      A promise of a measurable outcome to a named consumer. Compiles to
      expectations; fails as a broken promise.
    icon: "mdi:file-sign"
    include_in_menu: false
    display_labels:
      - name__value
    human_friendly_id:
      - name__value
    uniqueness_constraints:
      - [name__value]
    order_by:
      - name__value
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
        description: "Stable identifier; expectations cite it via derives_from URIs"
      - name: description
        kind: Text
        optional: true
        order_weight: 1100
        description: "The promise in one or two human sentences"
      - name: consumer
        kind: Text
        optional: true
        order_weight: 1200
        description: "Who loses if this breaks - customer, peer, internal team"
      - name: status
        kind: Dropdown
        optional: true
        default_value: "active"
        order_weight: 1300
        choices:
          - name: draft
            description: "Authored, not yet in force"
            color: "#94a3b8"
          - name: active
            description: "In force - compiled, gated, continuously evaluated"
            color: "#22c55e"
          - name: retired
            description: "No longer promised; kept for history"
            color: "#64748b"
    relationships:
      - name: intent
        peer: IntentDefinition
        identifier: intent__contract
        optional: false
        cardinality: one
        kind: Parent
        description: "The intent this contract achieves - exactly one, always"
      - name: objectives
        peer: IntentObjective
        identifier: contract__objective
        optional: true
        cardinality: many
        kind: Component
        on_delete: cascade
        description: "Measurable terms; typed kinds encode terms natively and leave this empty"

  - name: Policy
    namespace: Intent
    label: "Policy"
    description: >-
      A standing rule on HOW outcomes may be realized. Bites at decision
      time as a rejected change; attaches by scope, never owned.
    icon: "mdi:gavel"
    include_in_menu: false  # listed by menus/menu-intent.yml
    display_labels:
      - name__value
    human_friendly_id:
      - name__value
    uniqueness_constraints:
      - [name__value]
    order_by:
      - name__value
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: description
        kind: TextArea
        optional: true
        order_weight: 1100
        description: "The rule, stated so a reviewer can apply it without asking"
      - name: subject
        kind: Dropdown
        optional: true
        default_value: "network"
        order_weight: 1200
        choices:
          - name: network
            description: "Constrains the network's design/configuration"
            color: "#60a5fa"
          - name: operational
            description: "Constrains the automation - windows, canary strategies, change classes, rate limits"
            color: "#c084fc"
      - name: scope
        kind: Dropdown
        optional: true
        default_value: "global"
        order_weight: 1300
        choices:
          - name: global
            description: "Fleet-wide; applies to every intent"
          - name: domain
            description: "Applies to every intent in the listed domains"
          - name: intent
            description: "Applies only to explicitly linked intents"
      - name: domains
        kind: List
        optional: true
        order_weight: 1400
        description: "When scope=domain - which intent domains this governs"
      - name: enforcement
        kind: Text
        optional: true
        order_weight: 1500
        description: "Where it bites (informational): merge | compile | dispatch | continuous"
      - name: enabled
        kind: Boolean
        default_value: true
        order_weight: 1600
        description: "Kill switch. Prefer a scoped, expiring Waiver over disabling fleet-wide."
    relationships:
      - name: intents
        peer: IntentDefinition
        identifier: intent__policy
        optional: true
        cardinality: many
        kind: Generic
        description: "Explicit attachments when scope=intent; reference only, never ownership"

  - name: Invariant
    namespace: Intent
    label: "Invariant"
    description: >-
      A state condition that must always hold, independent of any contract
      or change. False = incident; evaluated continuously.
    icon: "mdi:shield-lock"
    include_in_menu: false
    display_labels:
      - name__value
    human_friendly_id:
      - name__value
    uniqueness_constraints:
      - [name__value]
    order_by:
      - name__value
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: description
        kind: TextArea
        optional: true
        order_weight: 1100
        description: "The condition that must never be untrue"
      - name: severity
        kind: Dropdown
        optional: true
        default_value: "critical"
        order_weight: 1200
        description: "What its violation is worth when it happens; merge projections derive blocking from it"
        choices:
          - name: warning
            description: "Degraded safety margin; projections report, do not block"
            color: "#f97316"
          - name: major
            description: "Real exposure; projections block the merge"
            color: "#f43f5e"
          - name: critical
            description: "Incident; projections block, live violations page"
            color: "#e11d48"
      - name: scope
        kind: Dropdown
        optional: true
        default_value: "global"
        order_weight: 1300
        choices:
          - name: global
            description: "Fleet-wide"
          - name: domain
            description: "Every intent in the listed domains"
          - name: intent
            description: "Only explicitly linked intents"
      - name: domains
        kind: List
        optional: true
        order_weight: 1400
        description: "When scope=domain - which intent domains this guarantees"
      - name: expression
        kind: TextArea
        optional: true
        order_weight: 1500
        description: "The checkable statement (free-form until the grammar lands); typed kinds encode it natively"
      - name: enabled
        kind: Boolean
        default_value: true
        order_weight: 1600
        description: "Kill switch, loud and fleet-wide. A scoped, expiring Waiver is almost always right instead."
    relationships:
      - name: intents
        peer: IntentDefinition
        identifier: intent__invariant
        optional: true
        cardinality: many
        kind: Generic
        description: "Explicit attachments when scope=intent; reference only, never ownership"

nodes:
  # ----------------------------------------------------------------- root
  - name: Definition
    namespace: Intent
    label: "Intent"
    description: >-
      Aggregate root - a named outcome with owner, priority, domain.
      Compiles to nothing; its attached instruments do the work.
    icon: "mdi:bullseye-arrow"
    include_in_menu: false  # listed by menus/menu-intent.yml
    display_labels:
      - name__value
    human_friendly_id:
      - name__value
    order_by:
      - name__value
    uniqueness_constraints:
      - [name__value]
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
        description: "Stable identifier; the root of every derives_from URI below it"
      - name: description
        kind: TextArea
        optional: true
        order_weight: 1100
        description: "The outcome in one human sentence - WHY, never mechanism"
      - name: domain
        kind: Text
        order_weight: 1200
        description: "Free-form taxonomy tag: connectivity, routing, observability, security, resilience, capacity, compliance, lifecycle, operations"
      - name: owner
        kind: Text
        order_weight: 1300
        description: "Accountable team or person; requests waivers on this intent's behalf"
      - name: priority
        kind: Dropdown
        optional: true
        default_value: "medium"
        order_weight: 1400
        description: "Business urgency; lives ONLY here and flows down (highest wins)"
        choices:
          - name: critical
            color: "#e11d48"
          - name: high
            color: "#f97316"
          - name: medium
            color: "#eab308"
          - name: low
            color: "#22c55e"
      - name: status
        kind: Dropdown
        optional: true
        default_value: "active"
        order_weight: 1500
        choices:
          - name: draft
            color: "#94a3b8"
          - name: active
            color: "#22c55e"
          - name: deprecated
            color: "#f97316"
          - name: retired
            color: "#64748b"
      - name: ticket
        kind: Text
        optional: true
        order_weight: 1600
        description: "Provenance link - the change/ticket this intent traces to"
    relationships:
      - name: contracts
        peer: IntentContract
        identifier: intent__contract
        optional: true
        cardinality: many
        kind: Component
        on_delete: cascade
        description: "ACHIEVED BY - owned, die with the intent. Zero contracts = untestable intent."
      - name: policies
        peer: IntentPolicy
        identifier: intent__policy
        optional: true
        cardinality: many
        kind: Generic
        description: "GOVERNED BY - referenced, never owned; only intent-scoped policies link here"
      - name: invariants
        peer: IntentInvariant
        identifier: intent__invariant
        optional: true
        cardinality: many
        kind: Generic
        description: "GUARANTEED BY - referenced, never owned; only intent-scoped invariants link here"
      - name: tenant
        peer: IntentTenant
        identifier: tenant__intents
        optional: true
        cardinality: one
        kind: Attribute
        description: "WHO this outcome serves; tenant-relative invariants are meaningless without it"

  - name: Objective
    namespace: Intent
    label: "Objective"
    description: >-
      One measurable term inside a contract (SRE analogue - the SLO). The
      unit expectations compile from and verdicts roll up to.
    icon: "mdi:check-circle-outline"
    include_in_menu: false
    display_labels:
      - name__value
    order_by:
      - name__value
    uniqueness_constraints:
      - ["contract", "name__value"]
    attributes:
      - name: name
        kind: Text
        order_weight: 1000
        description: "Short term name, unique within its contract"
      - name: description
        kind: TextArea
        optional: true
        order_weight: 1100
      - name: expression
        kind: TextArea
        order_weight: 1200
        description: "The checkable statement compilers turn into expectations"
    relationships:
      - name: contract
        peer: IntentContract
        identifier: contract__objective
        optional: false
        cardinality: one
        kind: Parent
        description: "The contract this term belongs to"

  - name: Waiver
    namespace: Intent
    label: "Waiver"
    description: >-
      Time-boxed permission for one subject to violate one policy or
      invariant. Hard expiry; approved by the target's owner.
    icon: "mdi:clock-alert-outline"
    include_in_menu: false  # listed by menus/menu-intent.yml
    display_labels:
      - name__value
    human_friendly_id:
      - name__value
    order_by:
      - expires_at__value
    uniqueness_constraints:
      - [name__value]
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: reason
        kind: TextArea
        order_weight: 1100
        description: "Why the violation is sanctioned, and what removes the need for it"
      - name: requested_by
        kind: Text
        order_weight: 1200
        description: "The SUBJECT's owner"
      - name: approved_by
        kind: Text
        optional: true
        order_weight: 1300
        description: "The TARGET's owner - must be set before the branch merges"
      - name: expires_at
        kind: DateTime
        order_weight: 1400
        description: "Hard expiry: past this instant the finding returns. Renewal = a new reviewed waiver."
      - name: subject_scope
        kind: Text
        optional: true
        order_weight: 1500
        description: "Device/site selector - narrows the subject, or stands alone as the subject"
    relationships:
      - name: waived_policy
        peer: IntentPolicy
        identifier: waiver__policy
        optional: true
        cardinality: one
        kind: Generic
        description: "The TARGET, when it is a policy - exactly one of waived_policy/waived_invariant must be set"
      - name: waived_invariant
        peer: IntentInvariant
        identifier: waiver__invariant
        optional: true
        cardinality: one
        kind: Generic
        description: "The TARGET, when it is an invariant - exactly one of waived_policy/waived_invariant must be set"
      - name: subject_intent
        peer: IntentDefinition
        identifier: waiver__subject_intent
        optional: true
        cardinality: one
        kind: Generic
        description: "The SUBJECT, when it is a whole intent"
      - name: subject_contract
        peer: IntentContract
        identifier: waiver__subject_contract
        optional: true
        cardinality: one
        kind: Generic
        description: "The SUBJECT, when it is one contract (optionally narrowed by subject_scope)"

  # ---- Free-form starter implementations ---------------------------------
  # Instantiable out of the box; domain-typed kinds below inherit the same
  # generics and encode their terms natively - both answer the same
  # platform queries, because the queries target the generics.
  - name: GenericContract
    namespace: Intent
    label: "Contract (free-form)"
    description: "General-purpose contract; every term is an Objective expression."
    icon: "mdi:file-sign"
    include_in_menu: false
    inherit_from:
      - IntentContract

  - name: GenericPolicy
    namespace: Intent
    label: "Policy (free-form)"
    description: "General-purpose policy; the rule lives in description/enforcement, checks implement it."
    icon: "mdi:gavel"
    include_in_menu: false  # reachable via the IntentPolicy menu entry
    inherit_from:
      - IntentPolicy

  - name: GenericInvariant
    namespace: Intent
    label: "Invariant (free-form)"
    description: "General-purpose invariant; the condition lives in expression."
    icon: "mdi:shield-check"
    include_in_menu: false
    inherit_from:
      - IntentInvariant

  # ------------------------------------------------- typed invariant kinds
  # One kind per condition (ADR-0017 D3): the type IS the kind, so checks
  # branch on __typename instead of a free enum. Kind name -> legacy type
  # string via camel_to_snake (IntentNoLeakInvariant -> no_leak).
  - name: NoLeakInvariant
    namespace: Intent
    generate_profile: false
    label: "Invariant: no leak"
    description: "Tenant routes must never appear outside their allowed zones."
    icon: "mdi:shield-lock"
    include_in_menu: false
    inherit_from:
      - IntentInvariant

  - name: NoReoriginationInvariant
    namespace: Intent
    generate_profile: false
    label: "Invariant: no re-origination"
    description: "Routes must keep their original AS path - no re-origination."
    icon: "mdi:shield-lock"
    include_in_menu: false
    inherit_from:
      - IntentInvariant

  - name: NoDefaultOriginationInvariant
    namespace: Intent
    generate_profile: false
    label: "Invariant: no default origination"
    description: "No default route may be originated toward this contract."
    icon: "mdi:shield-lock"
    include_in_menu: false
    inherit_from:
      - IntentInvariant

  - name: PrefixAuthorizationInvariant
    namespace: Intent
    generate_profile: false
    label: "Invariant: prefix authorization"
    description: "Only prefixes explicitly allowed by the contract may be announced."
    icon: "mdi:shield-lock"
    include_in_menu: false
    inherit_from:
      - IntentInvariant

  - name: RedundancyInvariant
    namespace: Intent
    generate_profile: false
    label: "Invariant: redundancy"
    description: "The tenant keeps the modeled level of redundancy at all times."
    icon: "mdi:shield-lock"
    include_in_menu: false
    inherit_from:
      - IntentInvariant

  - name: CapabilityPresentInvariant
    namespace: Intent
    generate_profile: false
    label: "Invariant: capability present"
    description: "Targeted platforms must expose the capability the contract needs."
    icon: "mdi:shield-lock"
    include_in_menu: false
    inherit_from:
      - IntentInvariant

  - name: ReachabilityPreservedInvariant
    namespace: Intent
    generate_profile: false
    label: "Invariant: reachability preserved"
    description: "Declared reachability must survive the change."
    icon: "mdi:shield-lock"
    include_in_menu: false
    inherit_from:
      - IntentInvariant

  - name: OobReachabilityInvariant
    namespace: Intent
    generate_profile: false
    label: "Invariant: OOB reachability"
    description: "Every device keeps a cabled management path to the OOB plane."
    icon: "mdi:shield-lock"
    include_in_menu: false
    inherit_from:
      - IntentInvariant

  # ------------------------------------------------- typed contract kinds
  - name: RoutingContract
    namespace: Intent
    description: "The terms of a BGP relationship - who peers, what may be announced, how it is tagged."
    label: "Routing Contract"
    icon: "mdi:router"
    inherit_from:
      - IntentContract
      - CoreArtifactTarget
    include_in_menu: false  # reachable via the IntentContract menu entry
    attributes:
      - name: role
        kind: Dropdown
        order_weight: 2000
        choices:
          - name: customer_edge
            label: "Customer edge"
          - name: core
            label: "Core"
          - name: internet_peering
            label: "Internet peering"
          - name: transit
            label: "Transit"
      - name: peer_asn
        kind: Number
        order_weight: 2100
      - name: afi_safis
        kind: List
        order_weight: 2200
      - name: local_preference
        kind: Number
        optional: true
        order_weight: 2300
      - name: max_prefixes_ipv4
        kind: Number
        optional: true
        order_weight: 2400
      - name: max_prefixes_ipv6
        kind: Number
        optional: true
        order_weight: 2500
      - name: attach_communities
        kind: List
        optional: true
        order_weight: 2600
      - name: require_communities
        kind: List
        optional: true
        order_weight: 2700
    relationships:
      - name: zone
        peer: IntentZone
        identifier: routingcontract__zone
        optional: false
        cardinality: one
        kind: Attribute
      - name: pe_devices
        peer: DcimGenericDevice
        identifier: routingcontract__pe_devices
        optional: true
        cardinality: many
        kind: Attribute
      - name: ce_devices
        peer: DcimGenericDevice
        identifier: routingcontract__ce_devices
        optional: true
        cardinality: many
        kind: Attribute
      - name: allowed_prefixes
        peer: IpamPrefix
        identifier: routingcontract__allowed_prefixes
        optional: true
        cardinality: many
        kind: Attribute
      - name: export_tenants
        peer: IntentTenant
        identifier: routingcontract__export_tenants
        optional: true
        cardinality: many
        kind: Attribute
      - name: export_deny_zones
        peer: IntentZone
        identifier: routingcontract__export_deny_zones
        optional: true
        cardinality: many
        kind: Attribute

  - name: ReachabilityContract
    namespace: Intent
    description: "A from-zone must reach a set of prefixes within a convergence budget."
    label: "Reachability Contract"
    icon: "mdi:lan-connect"
    inherit_from:
      - IntentContract
      - CoreArtifactTarget
    include_in_menu: false
    attributes:
      - name: max_convergence_seconds
        kind: Number
        optional: true
        order_weight: 2000
      - name: require_redundancy
        kind: Boolean
        optional: true
        order_weight: 2100
    relationships:
      - name: from_zone
        peer: IntentZone
        identifier: reachabilitycontract__from_zone
        optional: false
        cardinality: one
        kind: Attribute
      - name: to_prefixes
        peer: IpamPrefix
        identifier: reachabilitycontract__to_prefixes
        optional: true
        cardinality: many
        kind: Attribute

  - name: SecurityContract
    namespace: Intent
    description: "The filtering and hardening posture attached to a class of devices/interfaces."
    label: "Security Contract"
    icon: "mdi:security"
    inherit_from:
      - IntentContract
      - CoreArtifactTarget
    include_in_menu: false
    attributes:
      - name: attach_device_role
        kind: Dropdown
        order_weight: 2000
        choices:
          - name: pe
          - name: core
          - name: ce
      - name: attach_interface_role
        kind: Dropdown
        order_weight: 2100
        choices:
          - name: peering
          - name: cust
          - name: core
          - name: management
      - name: ddos_profile
        kind: Dropdown
        optional: true
        order_weight: 2200
        choices:
          - name: none
          - name: standard_l3vpn
          - name: hardened
    relationships:
      - name: rules
        peer: IntentSecurityRule
        identifier: securitycontract__rules
        optional: true
        cardinality: many
        kind: Component

  - name: ObservabilityContract
    namespace: Intent
    description: "The signals that must be collected and the conditions that page."
    label: "Observability Contract"
    icon: "mdi:eye-check"
    inherit_from:
      - IntentContract
      - CoreArtifactTarget
    include_in_menu: false
    relationships:
      - name: signals
        peer: IntentObservabilitySignal
        identifier: observabilitycontract__signals
        optional: true
        cardinality: many
        kind: Component

  - name: ReliabilityContract
    namespace: Intent
    description: "Redundancy and failure-domain requirements."
    label: "Reliability Contract"
    icon: "mdi:backup-restore"
    inherit_from:
      - IntentContract
      - CoreArtifactTarget
    include_in_menu: false
    attributes:
      - name: min_pe_attachments
        kind: Number
        optional: true
        order_weight: 2000
      - name: require_distinct_failure_domains
        kind: Boolean
        optional: true
        order_weight: 2100

  # --------------------------------------------------- contract child nodes
  - name: SecurityRule
    namespace: Intent
    description: "One rule inside a security contract."
    label: "Security Rule"
    icon: "mdi:filter"
    include_in_menu: false
    display_labels:
      - name__value
    human_friendly_id:
      - name__value
    uniqueness_constraints:
      - [name__value]
    order_by:
      - index__value
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: index
        kind: Number
        order_weight: 1100
      - name: action
        kind: Dropdown
        order_weight: 1200
        choices:
          - name: allow
            color: "#22c55e"
          - name: deny
            color: "#e11d48"
      - name: protocol
        kind: Dropdown
        optional: true
        order_weight: 1300
        choices:
          - name: any
          - name: tcp
          - name: udp
          - name: icmp
      - name: dst_ports
        kind: List
        optional: true
        order_weight: 1400
    relationships:
      - name: contract
        peer: IntentSecurityContract
        identifier: securitycontract__rules
        optional: false
        cardinality: one
        kind: Parent
      - name: src_zone
        peer: IntentZone
        identifier: securityrule__src_zone
        optional: true
        cardinality: one
        kind: Attribute
      - name: dst_prefixes
        peer: IpamPrefix
        identifier: securityrule__dst_prefixes
        optional: true
        cardinality: many
        kind: Attribute

  - name: ObservabilitySignal
    namespace: Intent
    description: "One signal inside an observability contract: what to measure and when to alert."
    label: "Observability Signal"
    icon: "mdi:pulse"
    include_in_menu: false
    display_labels:
      - name__value
    order_by:
      - name__value
    uniqueness_constraints:
      - [name__value]
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: signal
        kind: Dropdown
        order_weight: 1100
        choices:
          - name: bgp_session_state
          - name: bgp_route_count
          - name: policy_export_violation
          - name: interface_errors
          - name: device_reachability
      - name: direction
        kind: Dropdown
        optional: true
        order_weight: 1200
        choices:
          - name: inbound
          - name: outbound
      - name: condition
        kind: Text
        order_weight: 1300
      - name: frequency_seconds
        kind: Number
        optional: true
        order_weight: 1400
      - name: severity
        kind: Dropdown
        optional: true
        order_weight: 1500
        description: "Paging scale (compiled into alerting output; authored here until the ADR-0017 D4 mapping lands)"
        choices:
          - name: sev1
            color: "#e11d48"
          - name: sev2
            color: "#f97316"
          - name: sev3
            color: "#eab308"
          - name: sev4
            color: "#94a3b8"
    relationships:
      - name: contract
