# Platforms declare what they can do; capability_present invariants verify
# that what a contract needs to be observed is actually present on the boxes.
extensions:
  nodes:
    - kind: DcimPlatform
      relationships:
        - name: capabilities
          peer: IntentCapability
          identifier: platform__capability
          optional: true
          cardinality: many
          kind: Attribute
