# Intent lab topology - mirrors the InfraHub inventory 1:1
# (scripts/bootstrap.py). Device names, interface names, addressing and
# the OOB plane in this file all exist as modeled objects in the SoT.
#
# Vendor mix is deliberate:
#   pe-emea-01   Arista cEOS        - gNMI-native provider edge
#   pe-emea-02   Arista cEOS        - gNMI-native PE + internet peering
#   core-rr-01   Cisco IOL (IOS)    - vpn-ipv4 route reflector, MPLS L3VPN
#   ce-custc-0x  Nokia SR Linux     - customer edge (7220 IXR-D3L, free tier)
#   peer-inet-01 FRR                - internet-peer endpoint
#   oob-sw-01    Linux bridge       - the modeled OOB management plane
#
# core-rr-01 was a vJunos router, then Nokia SR Linux, and is Cisco IOL
# now. vJunos needs host CPU virtualization (/dev/kvm). SR Linux as a
# vpn-ipv4 reflector needs a 7250 IXR chassis, which containerlab only
# unlocks with a paid Nokia license - the free image emulates the 7220
# IXR, which has no MPLS subsystem at all. Cisco IOL has full MPLS L3VPN,
# needs neither KVM nor a license, so the reflector lives there now; the
# free SR Linux tier took over the customer edges, which need only plain
# eBGP. The intent never changed - DcimPlatform fields moved in the SoT
# and the already-registered renderers took over. That is the whole
# lesson of this repo, executed on itself.
#
# Image notes:
#   - ceos requires the image downloaded from arista.com
#   - cisco_iol requires the IOL image imported via vrnetlab
#     (https://containerlab.dev/manual/kinds/cisco_iol/). The
#     ADVENTERPRISEK9 train carries MPLS L3VPN / vpnv4.
#   - nokia_srlinux pulls freely from ghcr.io. `type: ixr-d3l` is the
#     free 7220 tier: it speaks eBGP ipv4-unicast as a CE and needs no
#     license. A vpn-ipv4 reflector would need a licensed 7250 chassis.
#   - the juniper_vjunosrouter kind below is kept, unused, so a reflector
#     can move back to vJunos as one `kind:`/`type:` here plus one
#     platform field in scripts/bootstrap.py. render_juniper_junos and
#     render_nokia_srlinux's dormant reflector body both never left the tree.

name: intent-lab

mgmt:
  network: intent-lab-mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  kinds:
    arista_ceos:
      image: ghcr.io/autonetops/ceos:latest
    cisco_iol:
      image: ghcr.io/autonetops/autonetops_labs/cisco_iol:latest
    juniper_vjunosrouter:
      image: vrnetlab/juniper_vjunos-router:24.2R
    linux:
      image: quay.io/frrouting/frr:10.1.0
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:24.10.1

  nodes:
    pe-emea-01:
      kind: arista_ceos
      mgmt-ipv4: 172.20.20.11
    pe-emea-02:
      kind: arista_ceos
      mgmt-ipv4: 172.20.20.12
    core-rr-01:
      kind: cisco_iol
      mgmt-ipv4: 172.20.20.13
    # to move the reflector back to vJunos (needs /dev/kvm), swap the kind
    # above for juniper_vjunosrouter and restore the ge-0/0/N interface
    # names in scripts/bootstrap.py.
    # The SR Linux admin password is set to admin/admin by
    # scripts/deploy_configs.py on push - containerlab 0.77 does not
    # reliably apply a CLI startup-config for the srl kind, and the config
    # is delivered over `docker exec sr_cli` (not SSH) anyway.
    ce-custc-01:
      kind: nokia_srlinux
      type: ixr-d3l         # free 7220 IXR tier - eBGP-only customer edge
      mgmt-ipv4: 172.20.20.21
    ce-custc-02:
      kind: nokia_srlinux
      type: ixr-d3l
      mgmt-ipv4: 172.20.20.22
    peer-inet-01:
      kind: linux
      mgmt-ipv4: 172.20.20.31
      binds:
        - ./frr/daemons:/etc/frr/daemons:ro
    #oob-sw-01:
    #  kind: linux
    #  image: alpine:3.20
    #  mgmt-ipv4: 172.20.20.41
    #  exec:
    #    # plain L2 bridge across all OOB ports
    #    - ip link add br-oob type bridge
    #    - ip link set br-oob up
    #    - sh -c 'for i in 1 2 3 4 5 6; do ip link set eth$i master br-oob && ip link set eth$i up; done'

  # Endpoints carry the port names the SoT models directly. cisco_iol maps
  # link N -> Ethernet0/N; nokia_srlinux uses ethernet-1/N; ceos maps
  # ethN -> EthernetN.
  links:
    # core plane
    - endpoints: ["pe-emea-01:eth1", "core-rr-01:Ethernet0/1"]
    - endpoints: ["pe-emea-02:eth1", "core-rr-01:Ethernet0/2"]
    # customer plane (dual-homed tenant: one CE per POP/PE)
    - endpoints: ["ce-custc-01:ethernet-1/1", "pe-emea-01:eth2"]
    - endpoints: ["ce-custc-02:ethernet-1/1", "pe-emea-02:eth2"]
    # internet peering plane
    - endpoints: ["peer-inet-01:eth1", "pe-emea-02:eth3"]
    # OOB management plane - modeled in the SoT, verified by the
    # oob_reachability check, exercised by the device_reachability signal
    #- endpoints: ["pe-emea-01:eth3", "oob-sw-01:eth1"]
    #- endpoints: ["pe-emea-02:eth4", "oob-sw-01:eth2"]
    #- endpoints: ["core-rr-01:Ethernet0/3", "oob-sw-01:eth3"]
    #- endpoints: ["ce-custc-01:ethernet-1/2", "oob-sw-01:eth4"]
    #- endpoints: ["ce-custc-02:ethernet-1/2", "oob-sw-01:eth5"]
    #- endpoints: ["peer-inet-01:eth2", "oob-sw-01:eth6"]
