query telemetry_collector($device: String!) {
  DcimDevice(name__value: $device) {
    edges {
      node {
        name {
          value
        }
        role {
          value
        }
        primary_address {
          node {
            address {
              value
            }
          }
        }
        platform {
          node {
            name {
              value
            }
            capabilities {
              edges {
                node {
                  name {
                    value
                  }
                  category {
                    value
                  }
                }
              }
            }
          }
        }
      }
    }
  }
  IntentObservabilitySignal {
    edges {
      node {
        name {
          value
        }
        signal {
          value
        }
        direction {
          value
        }
        frequency_seconds {
          value
        }
        severity {
          value
        }
        condition {
          value
        }
        contract {
          node {
            name {
              value
            }
            intent {
              node {
                tenant {
                  node {
                    name {
                      value
                    }
                  }
                }
              }
            }
          }
        }
        watches {
          node {
            name {
              value
            }
            ... on IntentRoutingContract {
              pe_devices {
                edges {
                  node {
                    name {
                      value
                    }
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}
